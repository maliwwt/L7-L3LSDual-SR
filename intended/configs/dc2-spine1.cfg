!
no enable password
no aaa root
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname dc2-spine1
!
spanning-tree mode none
!
vrf instance MGMT
!
interface Ethernet1
   description P2P_dc2-leaf2a_Ethernet1
   no shutdown
   mtu 1500
   no switchport
   ip address 192.168.203.4/31
!
interface Ethernet2
   description P2P_dc2-leaf2b_Ethernet1
   no shutdown
   mtu 1500
   no switchport
   ip address 192.168.203.6/31
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 192.168.201.13/32
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   vrf MGMT
   ip address 192.168.0.13/24
!
ip routing
no ip routing vrf MGMT
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 192.168.201.0/24 eq 32
!
ip route vrf MGMT 0.0.0.0/0 192.168.0.1
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
!
router bfd
   multihop interval 1200 min-rx 1200 multiplier 3
!
router bgp 65002
   router-id 192.168.201.13
   no bgp default ipv4-unicast
   maximum-paths 4
   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS next-hop-unchanged
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS bfd
   neighbor EVPN-OVERLAY-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-PEERS send-community
   neighbor EVPN-OVERLAY-PEERS maximum-routes 0
   neighbor IPv4-UNDERLAY-PEERS peer group
   neighbor IPv4-UNDERLAY-PEERS send-community
   neighbor IPv4-UNDERLAY-PEERS maximum-routes 256000
   neighbor 192.168.201.3 peer group EVPN-OVERLAY-PEERS
   neighbor 192.168.201.3 remote-as 65299
   neighbor 192.168.201.3 description dc2-leaf2a_Loopback0
   neighbor 192.168.201.4 peer group EVPN-OVERLAY-PEERS
   neighbor 192.168.201.4 remote-as 65299
   neighbor 192.168.201.4 description dc2-leaf2b_Loopback0
   neighbor 192.168.203.5 peer group IPv4-UNDERLAY-PEERS
   neighbor 192.168.203.5 remote-as 65299
   neighbor 192.168.203.5 description dc2-leaf2a_Ethernet1
   neighbor 192.168.203.7 peer group IPv4-UNDERLAY-PEERS
   neighbor 192.168.203.7 remote-as 65299
   neighbor 192.168.203.7 description dc2-leaf2b_Ethernet1
   redistribute connected route-map RM-CONN-2-BGP
   !
   address-family evpn
      neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv4
      no neighbor EVPN-OVERLAY-PEERS activate
      neighbor IPv4-UNDERLAY-PEERS activate
!
end
