!
hostname core1
!
interface Ethernet1
   description P2P_Core2_Ethernet1
   mtu 1500
   ip address 192.168.98.0/31
   isis enable CORE
   isis network point-to-point
!
interface Ethernet10
   description P2P_dc1-leaf1a_Ethernet10
   mtu 1500
   ip address 192.168.98.2/31
   isis enable CORE
   isis network point-to-point
!
interface Ethernet11
   description P2P_dc1-leaf1b_Ethernet11
   mtu 1500
   ip address 192.168.98.6/31
   isis enable CORE
   isis network point-to-point
!
interface Ethernet12
   description P2P_dc2-leaf2a_Ethernet12
   mtu 1500
   ip address 192.168.98.10/31
   isis enable CORE
   isis network point-to-point
!
interface Ethernet13
   description P2P_dc2-leaf2b_Ethernet13
   mtu 1500
   ip address 192.168.98.14/31
   isis enable CORE
   isis network point-to-point
!
interface Loopback0
   description SR-ISIS Router ID
   ip address 192.168.99.1/32
   isis enable CORE
   isis passive
!
mpls ip
!
mpls ldp
   shutdown
!
router bgp 65298
   router-id 192.168.99.1
   neighbor EVPN-CORE peer group
   neighbor EVPN-CORE next-hop-self
   neighbor EVPN-CORE update-source Loopback0
   neighbor EVPN-CORE send-community extended
   neighbor EVPN-LEAFS peer group
   neighbor EVPN-LEAFS update-source Loopback0
   neighbor EVPN-LEAFS ebgp-multihop 5
   neighbor EVPN-LEAFS route-reflector-client
   neighbor EVPN-LEAFS send-community extended
   neighbor 192.168.99.2 peer group EVPN-CORE
   neighbor 192.168.99.2 remote-as 65298
   neighbor 192.168.99.11 peer group EVPN-LEAFS
   neighbor 192.168.99.11 remote-as 65100
   neighbor 192.168.99.12 peer group EVPN-LEAFS
   neighbor 192.168.99.12 remote-as 65100
   neighbor 192.168.99.23 peer group EVPN-LEAFS
   neighbor 192.168.99.23 remote-as 65299
   neighbor 192.168.99.24 peer group EVPN-LEAFS
   neighbor 192.168.99.24 remote-as 65299
   !
   address-family evpn
      neighbor EVPN-CORE activate
      neighbor EVPN-LEAFS activate
!
router isis CORE
   net 49.0001.0000.0000.0001.00
   is-type level-2
   log-adjacency-changes
   !
   address-family ipv4 unicast
   !
   segment-routing mpls
      no shutdown
      prefix-segment 192.168.99.1/32 index 1
