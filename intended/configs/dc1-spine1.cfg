!
no enable password
no aaa root
!
username cvpadmin privilege 15 role network-admin secret sha512 $6$vaI8k49c6d6d4MiH$G6PS.1eO2zE9i4JUQHlFCwfiI8sI4GKAtkHziTW2hF6esh2LweSEoRtrfdrt/hiHk9E3lTAKYan0IlfbKfftN1
username service shell /bin/bash secret sha512 $6$.4OXg4oiHxDbapUM$HSmxZjYjRyZHW9KEd.nYzSdGzAksyM5O3ji.oVzJ1HkVSyNxLql8udmTOEvQE4gd5KMHRgWH0hcnw/Ng5XqaV/
!
daemon TerminAttr
   exec /usr/bin/TerminAttr -cvaddr=192.168.0.5:9910 -cvauth=token,/tmp/token -cvvrf=MGMT -smashexcludes=ale,flexCounter,hardware,kni,pulse,strata -taillogs
   no shutdown
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname dc1-spine1
dns domain atd.lab
!
spanning-tree mode none
!
management api http-commands
   protocol https
   no shutdown
   !
   vrf MGMT
      no shutdown
!
aaa authorization exec default local
!
interface Ethernet1
   description P2P_dc1-leaf1a_Ethernet1
   no shutdown
   mtu 1500
   no switchport
   ip address 192.168.103.0/31
!
interface Ethernet2
   description P2P_dc1-leaf1b_Ethernet1
   no shutdown
   mtu 1500
   no switchport
   ip address 192.168.103.2/31
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 192.168.101.11/32
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   ip address 192.168.0.11/24
!
ip routing
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 192.168.101.0/24 eq 32
!
ip route 0.0.0.0/0 192.168.0.1
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
!
router bfd
   multihop interval 1200 min-rx 1200 multiplier 3
!
router bgp 65001
   router-id 192.168.101.11
   no bgp default ipv4-unicast
   maximum-paths 4
   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS next-hop-unchanged
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS bfd
   neighbor EVPN-OVERLAY-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-PEERS send-community
   neighbor EVPN-OVERLAY-PEERS maximum-routes 0
   neighbor IPv4-UNDERLAY-PEERS peer group
   neighbor IPv4-UNDERLAY-PEERS send-community
   neighbor IPv4-UNDERLAY-PEERS maximum-routes 256000
   neighbor 192.168.101.1 peer group EVPN-OVERLAY-PEERS
   neighbor 192.168.101.1 remote-as 65100
   neighbor 192.168.101.1 description dc1-leaf1a_Loopback0
   neighbor 192.168.101.2 peer group EVPN-OVERLAY-PEERS
   neighbor 192.168.101.2 remote-as 65100
   neighbor 192.168.101.2 description dc1-leaf1b_Loopback0
   neighbor 192.168.103.1 peer group IPv4-UNDERLAY-PEERS
   neighbor 192.168.103.1 remote-as 65100
   neighbor 192.168.103.1 description dc1-leaf1a_Ethernet1
   neighbor 192.168.103.3 peer group IPv4-UNDERLAY-PEERS
   neighbor 192.168.103.3 remote-as 65100
   neighbor 192.168.103.3 description dc1-leaf1b_Ethernet1
   redistribute connected route-map RM-CONN-2-BGP
   !
   address-family evpn
      neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv4
      no neighbor EVPN-OVERLAY-PEERS activate
      neighbor IPv4-UNDERLAY-PEERS activate
!
end
