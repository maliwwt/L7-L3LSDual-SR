aaa_root:
  disabled: true
config_end: true
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet3
  description: MLAG_dc2-leaf2a_Ethernet3
  shutdown: false
  channel_group:
    id: 3
    mode: active
  metadata:
    peer: dc2-leaf2a
    peer_interface: Ethernet3
    peer_type: mlag_peer
- name: Ethernet4
  description: MLAG_dc2-leaf2a_Ethernet4
  shutdown: false
  channel_group:
    id: 3
    mode: active
  metadata:
    peer: dc2-leaf2a
    peer_interface: Ethernet4
    peer_type: mlag_peer
- name: Ethernet1
  description: P2P_dc2-spine1_Ethernet6
  shutdown: false
  mtu: 1500
  ip_address: 192.168.203.7/31
  metadata:
    peer: dc2-spine1
    peer_interface: Ethernet6
    peer_type: spine
  switchport:
    enabled: false
- name: Ethernet5
  description: SERVER_dc2-l2leaf2a_Ethernet2
  shutdown: false
  channel_group:
    id: 5
    mode: active
  metadata:
    peer: dc2-l2leaf2a
    peer_interface: Ethernet2
    peer_type: server
    peer_key: servers
- name: Ethernet13
  description: P2P_Core1_Ethernet13
  mtu: 1500
  ip_address: 192.168.98.15/31
  isis_enable: CORE
  isis_network_point_to_point: true
- name: Ethernet14
  description: P2P_Core2_Ethernet14
  mtu: 1500
  ip_address: 192.168.98.17/31
  isis_enable: CORE
  isis_network_point_to_point: true
hostname: dc2-leaf2b
ip_igmp_snooping:
  globally_enabled: true
ip_routing: true
ip_virtual_router_mac_address: 00:1c:73:00:00:99
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 192.168.201.4/32
- name: Loopback1
  description: VXLAN_TUNNEL_SOURCE
  shutdown: false
  ip_address: 192.168.202.3/32
- name: Loopback2
  description: SR-ISIS Router ID
  ip_address: 192.168.99.24/32
  isis_enable: CORE
  isis_passive: true
management_interfaces:
- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: MGMT
  ip_address: 192.168.0.24/24
  type: oob
  gateway: 192.168.0.1
metadata:
  is_deployed: true
  platform: cEOS
  fabric_name: FABRIC
  validate_hardware:
    enabled: false
mlag_configuration:
  domain_id: mlag2
  local_interface: Vlan4094
  peer_address: 10.255.252.4
  peer_link: Port-Channel3
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
port_channel_interfaces:
- name: Port-Channel3
  description: MLAG_dc2-leaf2a_Port-Channel3
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      groups:
      - MLAG
- name: Port-Channel5
  description: PortChannel host3
  shutdown: false
  mlag: 5
  spanning_tree_portfast: edge
  switchport:
    enabled: true
    mode: access
    access_vlan: 10
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 192.168.201.0/24 eq 32
  - sequence: 20
    action: permit 192.168.202.0/24 eq 32
- name: PL-MLAG-PEER-VRFS
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.251.4/31
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
- name: RM-CONN-2-BGP-VRFS
  sequence_numbers:
  - sequence: 10
    type: deny
    match:
    - ip address prefix-list PL-MLAG-PEER-VRFS
  - sequence: 20
    type: permit
router_bfd:
  multihop:
    interval: 1200
    min_rx: 1200
    multiplier: 3
router_bgp:
  as: '65299'
  router_id: 192.168.201.4
  maximum_paths:
    paths: 4
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      type: ipv4
    remote_as: '65299'
    description: dc2-leaf2a
    next_hop_self: true
    send_community: all
    maximum_routes: 256000
    route_map_in: RM-MLAG-PEER-IN
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.255.251.4
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      peer: dc2-leaf2a
    description: dc2-leaf2a_Vlan4093
  - ip_address: 192.168.203.6
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65002'
    metadata:
      peer: dc2-spine1
    description: dc2-spine1_Ethernet6
  - ip_address: 192.168.201.13
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65002'
    metadata:
      peer: dc2-spine1
    description: dc2-spine1_Loopback0
  - ip_address: 192.168.99.1
    remote_as: '65298'
    update_source: Loopback2
    send_community: extended
    ebgp_multihop: 5
  - ip_address: 192.168.99.2
    remote_as: '65298'
    update_source: Loopback2
    send_community: extended
    ebgp_multihop: 5
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  vlans:
  - id: 10
    metadata:
      tenants:
      - ACME
    rd: 192.168.201.4:10010
    route_targets:
      both:
      - 10010:10010
    redistribute_routes:
    - learned
  - id: 20
    metadata:
      tenants:
      - ACME
    rd: 192.168.201.4:10020
    route_targets:
      both:
      - 10020:10020
    redistribute_routes:
    - learned
  address_family_evpn:
    neighbors:
    - ip_address: 192.168.99.1
      encapsulation: mpls
    - ip_address: 192.168.99.2
      encapsulation: mpls
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
  vrfs:
  - name: VRF_A
    rd: 192.168.201.4:10
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - '10:10'
      export:
      - address_family: evpn
        route_targets:
        - '10:10'
    router_id: 192.168.201.4
    neighbors:
    - ip_address: 10.255.251.4
      peer_group: MLAG-IPv4-UNDERLAY-PEER
      description: dc2-leaf2a_Vlan3009
    redistribute:
      connected:
        enabled: true
        route_map: RM-CONN-2-BGP-VRFS
router_isis:
  instance: CORE
  net: 49.0001.0000.0000.0024.00
  is_type: level-2
  address_family_ipv4:
    enabled: true
  segment_routing_mpls:
    enabled: true
    router_id: 192.168.99.24
    prefix_segments:
    - prefix: 192.168.99.24/32
      index: 24
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: mstp
  mst_instances:
  - id: '0'
    priority: 16384
  no_spanning_tree_vlan: 4093-4094
static_routes:
- vrf: MGMT
  prefix: 0.0.0.0/0
  next_hop: 192.168.0.1
transceiver_qsfp_default_mode_4x10: true
vlan_interfaces:
- name: Vlan4093
  description: MLAG_L3
  shutdown: false
  ip_address: 10.255.251.5/31
  mtu: 1500
- name: Vlan4094
  description: MLAG
  shutdown: false
  ip_address: 10.255.252.5/31
  mtu: 1500
  no_autostate: true
- name: Vlan10
  description: DMZ
  shutdown: false
  vrf: VRF_A
  ip_address_virtual: 10.1.10.1/24
  metadata:
    tenants:
    - ACME
- name: Vlan20
  description: Internal
  shutdown: false
  vrf: VRF_A
  ip_address_virtual: 10.1.20.1/24
  metadata:
    tenants:
    - ACME
- name: Vlan3009
  description: MLAG_L3_VRF_VRF_A
  shutdown: false
  vrf: VRF_A
  ip_address: 10.255.251.5/31
  mtu: 1500
  metadata:
    tenants:
    - ACME
    type: underlay_peering
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vlans:
- id: 4093
  name: MLAG_L3
  trunk_groups:
  - MLAG
  metadata:
    tenants:
    - system
- id: 4094
  name: MLAG
  trunk_groups:
  - MLAG
  metadata:
    tenants:
    - system
- id: 10
  name: DMZ
  metadata:
    tenants:
    - ACME
- id: 20
  name: Internal
  metadata:
    tenants:
    - ACME
- id: 3009
  name: MLAG_L3_VRF_VRF_A
  trunk_groups:
  - MLAG
  metadata:
    tenants:
    - ACME
vrfs:
- name: MGMT
  ip_routing: false
- name: VRF_A
  ip_routing: true
  metadata:
    tenants:
    - ACME
vxlan_interface:
  vxlan1:
    description: dc2-leaf2b_VTEP
    vxlan:
      source_interface: Loopback1
      udp_port: 4789
      virtual_router_encapsulation_mac_address: mlag-system-id
      vlans:
      - id: 10
        vni: 10010
      - id: 20
        vni: 10020
      vrfs:
      - name: VRF_A
        vni: 10
