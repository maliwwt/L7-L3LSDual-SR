---
fabric_name: FABRIC
evpn_vlan_aware_bundles: false
custom_structured_configuration_prefix: ['custom_']
p2p_uplinks_mtu: 1500
bfd_multihop:
  interval: 1200
  min_rx: 1200
  multiplier: 3
bgp_update_wait_install: false
bgp_update_wait_for_convergence: false
mgmt_interface: Management1
mgmt_interface_vrf: default
mgmt_gateway: 192.168.0.1

# Local users — AVD 6.x syntax
aaa_settings:
  local_users:
    - name: cvpadmin
      privilege: 15
      role: network-admin
      sha512_password: "$6$vaI8k49c6d6d4MiH$G6PS.1eO2zE9i4JUQHlFCwfiI8sI4GKAtkHziTW2hF6esh2LweSEoRtrfdrt/hiHk9E3lTAKYan0IlfbKfftN1"
    - name: service
      shell: /bin/bash
      sha512_password: "$6$.4OXg4oiHxDbapUM$HSmxZjYjRyZHW9KEd.nYzSdGzAksyM5O3ji.oVzJ1HkVSyNxLql8udmTOEvQE4gd5KMHRgWH0hcnw/Ng5XqaV/"

# Everything else via custom_structured_configuration
custom_structured_configuration_daemon_terminattr:
  exec: /usr/bin/TerminAttr -smashexcludes=ale,flexCounter,hardware,kni,pulse,strata -cvaddr=192.168.0.5:9910 -cvauth=token,/tmp/token -cvvrf=default -taillogs
  no_shutdown: true

custom_structured_configuration_management_api_http:
  enable_vrfs:
    - name: MGMT
  enable_https: true

custom_structured_configuration_aaa_authorization:
  exec:
    default: local

custom_structured_configuration_ip_name_servers:
  - ip_address: 169.254.169.254
    vrf: default

custom_structured_configuration_dns_domain: atd.lab
